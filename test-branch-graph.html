<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branch Graph Test</title>
  <style>
    :root {
      --color-surface: #1e1e2e;
      --color-text-muted: #888;
    }
    body {
      font-family: system-ui, sans-serif;
      background: #121220;
      color: #e0e0e0;
      margin: 2rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.1rem; color: #aaa; margin-top: 2rem; }
    .controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    button {
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { background: #3a3a4e; }
    textarea {
      width: 100%;
      height: 150px;
      background: #1a1a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.5rem;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      resize: vertical;
    }
    .graph-container {
      margin-top: 1rem;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.5rem;
      background: #1a1a2a;
    }
    .stats {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.5rem;
    }
    .header-badges {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.5rem;
    }
    .badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; font-weight: 600; }
    .badge--client { background: #4caf50; color: #fff; }
    .badge--api { background: #e040fb; color: #fff; }
  </style>
</head>
<body>
  <h1>Branch Graph Test Harness</h1>
  <p style="font-size:0.85rem;color:#888">Side-by-side commit graph: client (mirrored) | shared labels | API</p>

  <div class="controls">
    <button onclick="loadFromApi()">Fetch from API</button>
    <button onclick="renderFromTextarea()">Render JSON</button>
    <button onclick="loadSample()">Load Sample</button>
  </div>

  <label for="api-url" style="font-size:0.8rem;color:#888">API URL:</label>
  <input id="api-url" type="text" value="http://localhost:4500/api/carkedit/branches/graph"
    style="width:100%;background:#1a1a2a;color:#e0e0e0;border:1px solid #444;border-radius:4px;padding:0.3rem 0.5rem;font-size:0.85rem;margin-bottom:0.5rem">

  <textarea id="json-input" placeholder='Paste JSON here: { "client": [...], "api": [...] }'></textarea>

  <div class="header-badges">
    <span><span class="badge badge--client">client</span> carkedit-online</span>
    <span style="opacity:0.4">|</span>
    <span><span class="badge badge--api">api</span> carkedit-api</span>
  </div>
  <div class="graph-container" id="branch-graph-combined">
    <div style="font-size:0.8rem;color:var(--color-text-muted)">No data loaded</div>
  </div>
  <div class="stats" id="stats-combined"></div>

  <script>
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const LANE_COLORS = ['#2196f3', '#ff6b35', '#e8c900', '#4caf50', '#e040fb', '#00bcd4', '#ff5252', '#7c4dff'];

    function assignLanes(commits) {
      const branchLaneMap = new Map();
      branchLaneMap.set('main', 0);
      let nextLane = 1;
      for (const c of commits) {
        const br = c.branch || (c.onMain ? 'main' : '_unknown');
        if (!branchLaneMap.has(br)) branchLaneMap.set(br, nextLane++);
      }
      const nodes = commits.map((c, i) => ({
        ...c,
        lane: branchLaneMap.get(c.branch || (c.onMain ? 'main' : '_unknown')) || 0,
        row: i,
      }));
      return { nodes, maxLane: Math.max(0, nextLane - 1) };
    }

    function buildBranchColorMap(clientCommits, apiCommits) {
      const map = new Map();
      map.set('main', LANE_COLORS[0]);
      let idx = 1;
      for (const c of [...clientCommits, ...apiCommits]) {
        const br = c.branch || (c.onMain ? 'main' : '_unknown');
        if (!map.has(br)) { map.set(br, LANE_COLORS[idx % LANE_COLORS.length]); idx++; }
      }
      return map;
    }

    function renderCombinedGraph(containerId, clientCommits, apiCommits) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if ((!clientCommits || clientCommits.length === 0) && (!apiCommits || apiCommits.length === 0)) {
        container.innerHTML = '<div style="font-size:0.8rem;color:var(--color-text-muted)">No commit data available</div>';
        return;
      }

      const cResult = assignLanes(clientCommits || []);
      const aResult = assignLanes(apiCommits || []);
      const cNodes = cResult.nodes, aNodes = aResult.nodes;
      const cMaxLane = cResult.maxLane, aMaxLane = aResult.maxLane;

      const branchColors = buildBranchColorMap(clientCommits || [], apiCommits || []);
      function branchColor(br) { return branchColors.get(br) || LANE_COLORS[0]; }

      const cMap = new Map(); cNodes.forEach(n => cMap.set(n.hash, n));
      const aMap = new Map(); aNodes.forEach(n => aMap.set(n.hash, n));

      const LANE_W = 20, ROW_H = 28, PAD = 12, COMMIT_R = 5, CHAR_W = 7.2;
      const LABEL_COL_W = 220, LABEL_GAP = 12;
      const cGraphW = PAD + (cMaxLane + 1) * LANE_W + PAD;
      const aGraphW = PAD + (aMaxLane + 1) * LANE_W + PAD;
      const maxRows = Math.max(cNodes.length, aNodes.length, 1);
      const SVG_H = maxRows * ROW_H + PAD * 2;
      const labelOrigin = cGraphW + LABEL_GAP;
      const aOrigin = cGraphW + LABEL_GAP + LABEL_COL_W + LABEL_GAP;
      const SVG_W = aOrigin + aGraphW;

      function cLaneX(lane) { return cGraphW - PAD - lane * LANE_W; }
      function aLaneX(lane) { return aOrigin + PAD + lane * LANE_W; }
      function rowY(row) { return PAD + row * ROW_H + ROW_H / 2; }

      let lines = '', dots = '', labels = '';

      function drawSide(nodes, commitMap, laneXFn, side) {
        const branchGroups = new Map();
        for (const node of nodes) {
          const br = node.branch || (node.onMain ? 'main' : '_unknown');
          if (!branchGroups.has(br)) branchGroups.set(br, []);
          branchGroups.get(br).push(node);
        }
        // Continuous backbone line for each branch
        for (const [br, brNodes] of branchGroups) {
          if (brNodes.length < 2) continue;
          const sorted = [...brNodes].sort((a, b) => a.row - b.row);
          const x = laneXFn(sorted[0].lane);
          const color = branchColor(br);
          const sw = br === 'main' ? 2.5 : 2;
          lines += '<line x1="' + x + '" y1="' + rowY(sorted[0].row) + '" x2="' + x + '" y2="' + rowY(sorted[sorted.length - 1].row)
            + '" stroke="' + color + '" stroke-width="' + sw + '"/>';
        }
        // Fork curves: branch bottom → merge-base on main
        for (const [br, brNodes] of branchGroups) {
          if (br === 'main') continue;
          const sorted = [...brNodes].sort((a, b) => a.row - b.row);
          const oldest = sorted[sorted.length - 1];
          if (!oldest.parents.length) continue;
          const parent = commitMap.get(oldest.parents[0]);
          if (!parent || oldest.lane === parent.lane) continue;
          const bx = laneXFn(oldest.lane), by = rowY(oldest.row);
          const px = laneXFn(parent.lane), py = rowY(parent.row);
          const midY = (by + py) / 2;
          lines += '<path d="M ' + bx + ' ' + by + ' C ' + bx + ' ' + midY + ' ' + px + ' ' + midY + ' ' + px + ' ' + py
            + '" fill="none" stroke="' + branchColor(br) + '" stroke-width="2"/>';
        }
        // Commit dots
        for (const node of nodes) {
          const x = laneXFn(node.lane), y = rowY(node.row);
          const color = branchColor(node.branch || 'main');
          const isMerge = node.parents.length > 1;
          const title = escapeHtml((side === 'client' ? '[C] ' : '[A] ') + node.hash.substring(0, 7) + ' \u2014 ' + node.subject);
          dots += '<g><title>' + title + '</title>';
          if (isMerge) {
            dots += '<circle cx="' + x + '" cy="' + y + '" r="' + (COMMIT_R + 1) + '" fill="var(--color-surface, #1e1e2e)" stroke="' + color + '" stroke-width="2"/>';
          } else {
            dots += '<circle cx="' + x + '" cy="' + y + '" r="' + COMMIT_R + '" fill="' + color + '"/>';
          }
          dots += '</g>';
        }
      }

      drawSide(cNodes, cMap, cLaneX, 'client');
      drawSide(aNodes, aMap, aLaneX, 'api');

      // Deduplicated shared labels
      const refMap = new Map();
      for (const node of cNodes) {
        for (const ref of node.refs) {
          const entry = refMap.get(ref) || {};
          entry.clientRow = node.row; entry.clientHash = node.hash; entry.branch = node.branch || 'main';
          refMap.set(ref, entry);
        }
      }
      for (const node of aNodes) {
        for (const ref of node.refs) {
          const entry = refMap.get(ref) || {};
          entry.apiRow = node.row; entry.apiHash = node.hash; if (!entry.branch) entry.branch = node.branch || 'main';
          refMap.set(ref, entry);
        }
      }
      const sortedRefs = [...refMap.entries()].sort((a, b) => {
        return Math.min(a[1].clientRow ?? Infinity, a[1].apiRow ?? Infinity) - Math.min(b[1].clientRow ?? Infinity, b[1].apiRow ?? Infinity);
      });
      const usedYPositions = [];
      for (const [ref, info] of sortedRefs) {
        let y = rowY(Math.min(info.clientRow ?? Infinity, info.apiRow ?? Infinity));
        for (const usedY of usedYPositions) { if (Math.abs(y - usedY) < 14) y = usedY + 14; }
        usedYPositions.push(y);
        const color = branchColor(info.branch);
        let refX = labelOrigin + 4;
        if (info.clientRow !== undefined) { labels += '<circle cx="' + refX + '" cy="' + y + '" r="3" fill="#4caf50" opacity="0.7"/>'; refX += 8; }
        if (info.apiRow !== undefined) { labels += '<circle cx="' + refX + '" cy="' + y + '" r="3" fill="#e040fb" opacity="0.7"/>'; refX += 8; }
        const badgeW = Math.ceil(ref.length * CHAR_W) + 12;
        if (refX + badgeW <= labelOrigin + LABEL_COL_W) {
          labels += '<g transform="translate(' + refX + ',' + (y - 8) + ')">'
            + '<rect rx="4" ry="4" width="' + badgeW + '" height="16" fill="' + color + '" opacity="0.2"/>'
            + '<text x="6" y="12" fill="' + color + '" font-size="10" font-weight="600" font-family="ui-monospace,monospace">'
            + escapeHtml(ref) + '</text></g>';
          refX += badgeW + 4;
        }
        const hash = info.clientHash || info.apiHash || '';
        labels += '<text x="' + refX + '" y="' + (y + 4) + '" fill="var(--color-text-muted)" font-size="9" font-family="ui-monospace,monospace">'
          + escapeHtml(hash.substring(0, 7)) + '</text>';
      }

      const dividerColor = 'rgba(255,255,255,0.06)';
      lines += '<line x1="' + (cGraphW + LABEL_GAP / 2) + '" y1="0" x2="' + (cGraphW + LABEL_GAP / 2) + '" y2="' + SVG_H + '" stroke="' + dividerColor + '"/>';
      lines += '<line x1="' + (aOrigin - LABEL_GAP / 2) + '" y1="0" x2="' + (aOrigin - LABEL_GAP / 2) + '" y2="' + SVG_H + '" stroke="' + dividerColor + '"/>';
      labels += '<text x="' + (cGraphW / 2) + '" y="10" fill="var(--color-text-muted)" font-size="9" font-family="ui-monospace,monospace" text-anchor="middle" opacity="0.5">client</text>';
      labels += '<text x="' + (aOrigin + aGraphW / 2) + '" y="10" fill="var(--color-text-muted)" font-size="9" font-family="ui-monospace,monospace" text-anchor="middle" opacity="0.5">api</text>';

      container.innerHTML = '<div style="overflow-x:auto">'
        + '<svg class="bm__graph-svg" viewBox="0 0 ' + SVG_W + ' ' + SVG_H + '" width="' + SVG_W + '" height="' + SVG_H + '" xmlns="http://www.w3.org/2000/svg">'
        + lines + dots + labels + '</svg></div>';
    }

    function showStats(id, clientCommits, apiCommits) {
      const el = document.getElementById(id);
      if (!el) return;
      const cBr = [...new Set((clientCommits||[]).filter(c => !c.onMain).map(c => c.branch))];
      const aBr = [...new Set((apiCommits||[]).filter(c => !c.onMain).map(c => c.branch))];
      const shared = cBr.filter(b => aBr.includes(b));
      el.textContent = 'Client: ' + (clientCommits||[]).length + ' commits (' + cBr.length + ' branches) | API: ' + (apiCommits||[]).length + ' commits (' + aBr.length + ' branches) | Shared branches: ' + shared.length;
    }

    function renderFromTextarea() {
      try {
        const data = JSON.parse(document.getElementById('json-input').value);
        renderCombinedGraph('branch-graph-combined', data.client || [], data.api || []);
        showStats('stats-combined', data.client, data.api);
      } catch (e) { alert('Invalid JSON: ' + e.message); }
    }

    async function loadFromApi() {
      const url = document.getElementById('api-url').value;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('json-input').value = JSON.stringify(data, null, 2);
        renderCombinedGraph('branch-graph-combined', data.client || [], data.api || []);
        showStats('stats-combined', data.client, data.api);
      } catch (e) { alert('Fetch failed: ' + e.message); }
    }

    function loadSample() {
      const sample = {
        client: [
          { hash: 'aaa1111', parents: ['aaa2222'], date: '2026-04-14T22:00:00+10:00', subject: 'Merge branch dev/feature-a', refs: ['main'], onMain: true, branch: 'main' },
          { hash: 'bbb1111', parents: ['bbb2222'], date: '2026-04-14T21:00:00+10:00', subject: 'feat: add button animation', refs: ['dev/feature-a'], onMain: false, branch: 'dev/feature-a' },
          { hash: 'aaa2222', parents: ['aaa3333'], date: '2026-04-14T20:00:00+10:00', subject: 'fix: correct color palette', refs: [], onMain: true, branch: 'main' },
          { hash: 'bbb2222', parents: ['aaa3333'], date: '2026-04-14T19:00:00+10:00', subject: 'feat: initial button work', refs: [], onMain: false, branch: 'dev/feature-a' },
          { hash: 'ccc1111', parents: ['ccc2222'], date: '2026-04-14T18:00:00+10:00', subject: 'refactor: extract utils', refs: ['dev/refactor-utils'], onMain: false, branch: 'dev/refactor-utils' },
          { hash: 'aaa3333', parents: ['aaa4444'], date: '2026-04-14T17:00:00+10:00', subject: 'Merge branch dev/bugfix', refs: [], onMain: true, branch: 'main' },
          { hash: 'ccc2222', parents: ['aaa4444'], date: '2026-04-14T16:00:00+10:00', subject: 'refactor: move helpers', refs: [], onMain: false, branch: 'dev/refactor-utils' },
          { hash: 'aaa4444', parents: ['aaa5555'], date: '2026-04-13T22:00:00+10:00', subject: 'chore: update deps', refs: [], onMain: true, branch: 'main' },
          { hash: 'aaa5555', parents: [], date: '2026-04-13T20:00:00+10:00', subject: 'initial commit', refs: [], onMain: true, branch: 'main' },
        ],
        api: [
          { hash: 'ddd1111', parents: ['ddd2222'], date: '2026-04-14T21:00:00+10:00', subject: 'feat: add graph endpoint', refs: ['main'], onMain: true, branch: 'main' },
          { hash: 'eee1111', parents: ['eee2222'], date: '2026-04-14T20:30:00+10:00', subject: 'feat: api feature-a support', refs: ['dev/feature-a'], onMain: false, branch: 'dev/feature-a' },
          { hash: 'ddd2222', parents: ['ddd3333'], date: '2026-04-14T19:00:00+10:00', subject: 'fix: auth middleware', refs: [], onMain: true, branch: 'main' },
          { hash: 'eee2222', parents: ['ddd3333'], date: '2026-04-14T18:30:00+10:00', subject: 'feat: api feature-a init', refs: [], onMain: false, branch: 'dev/feature-a' },
          { hash: 'ddd3333', parents: [], date: '2026-04-13T18:00:00+10:00', subject: 'initial setup', refs: [], onMain: true, branch: 'main' },
        ]
      };
      document.getElementById('json-input').value = JSON.stringify(sample, null, 2);
      renderCombinedGraph('branch-graph-combined', sample.client, sample.api);
      showStats('stats-combined', sample.client, sample.api);
    }
  </script>
</body>
</html>
