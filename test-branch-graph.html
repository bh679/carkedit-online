<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branch Graph Test</title>
  <style>
    :root {
      --color-surface: #1e1e2e;
      --color-text-muted: #888;
    }
    body {
      font-family: system-ui, sans-serif;
      background: #121220;
      color: #e0e0e0;
      margin: 2rem;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.1rem; color: #aaa; margin-top: 2rem; }
    .controls {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    button {
      background: #2a2a3e;
      color: #e0e0e0;
      border: 1px solid #444;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { background: #3a3a4e; }
    textarea {
      width: 100%;
      height: 200px;
      background: #1a1a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.5rem;
      font-family: ui-monospace, monospace;
      font-size: 0.8rem;
      resize: vertical;
    }
    .graph-container {
      margin-top: 1rem;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 0.5rem;
      background: #1a1a2a;
    }
    .stats {
      font-size: 0.8rem;
      color: #888;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <h1>Branch Graph Test Harness</h1>
  <p style="font-size:0.85rem;color:#888">Paste JSON from the API endpoint or load sample data to test the graph renderer.</p>

  <div class="controls">
    <button onclick="loadFromApi()">Fetch from API</button>
    <button onclick="renderFromTextarea()">Render JSON</button>
    <button onclick="loadSample()">Load Sample</button>
  </div>

  <label for="api-url" style="font-size:0.8rem;color:#888">API URL:</label>
  <input id="api-url" type="text" value="http://localhost:4500/api/carkedit/branches/graph"
    style="width:100%;background:#1a1a2a;color:#e0e0e0;border:1px solid #444;border-radius:4px;padding:0.3rem 0.5rem;font-size:0.85rem;margin-bottom:0.5rem">

  <textarea id="json-input" placeholder='Paste JSON here: { "client": [...], "api": [...] }'></textarea>

  <h2>Client Repo</h2>
  <div class="graph-container" id="branch-graph-client">
    <div style="font-size:0.8rem;color:var(--color-text-muted)">No data loaded</div>
  </div>
  <div class="stats" id="stats-client"></div>

  <h2>API Repo</h2>
  <div class="graph-container" id="branch-graph-api">
    <div style="font-size:0.8rem;color:var(--color-text-muted)">No data loaded</div>
  </div>
  <div class="stats" id="stats-api"></div>

  <script>
    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    const LANE_COLORS = ['#2196f3', '#ff6b35', '#e8c900', '#4caf50', '#e040fb', '#00bcd4', '#ff5252', '#7c4dff'];

    function assignLanes(commits) {
      const branchLaneMap = new Map();
      branchLaneMap.set('main', 0);
      let nextLane = 1;

      for (const c of commits) {
        const br = c.branch || (c.onMain ? 'main' : '_unknown');
        if (!branchLaneMap.has(br)) {
          branchLaneMap.set(br, nextLane++);
        }
      }

      const nodes = commits.map((c, i) => ({
        ...c,
        lane: branchLaneMap.get(c.branch || (c.onMain ? 'main' : '_unknown')) || 0,
        row: i,
      }));

      return { nodes, maxLane: Math.max(0, nextLane - 1) };
    }

    function renderCommitTree(containerId, commits) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!commits || commits.length === 0) {
        container.innerHTML = '<div style="font-size:0.8rem;color:var(--color-text-muted)">No commit data available</div>';
        return;
      }

      const { nodes, maxLane } = assignLanes(commits);
      const commitMap = new Map();
      nodes.forEach(n => commitMap.set(n.hash, n));

      const LANE_W = 20;
      const ROW_H = 28;
      const PAD_L = 16;
      const PAD_T = 12;
      const COMMIT_R = 5;
      const GRAPH_W = PAD_L + (maxLane + 1) * LANE_W + 16;
      const LABEL_X = GRAPH_W + 8;
      const SVG_W = Math.max(LABEL_X + 360, 500);
      const SVG_H = nodes.length * ROW_H + PAD_T * 2;

      function laneX(lane) { return PAD_L + lane * LANE_W; }
      function rowY(row) { return PAD_T + row * ROW_H + ROW_H / 2; }
      function laneColor(lane) { return LANE_COLORS[lane % LANE_COLORS.length]; }

      let lines = '';
      let dotGroups = '';
      let labels = '';
      const CHAR_W = 7.2;

      const mainNodes = nodes.filter(n => n.onMain).sort((a, b) => a.row - b.row);
      if (mainNodes.length > 1) {
        const mx = laneX(0);
        for (let i = 0; i < mainNodes.length - 1; i++) {
          const y1 = rowY(mainNodes[i].row);
          const y2 = rowY(mainNodes[i + 1].row);
          lines += '<line x1="' + mx + '" y1="' + y1 + '" x2="' + mx + '" y2="' + y2
            + '" stroke="' + LANE_COLORS[0] + '" stroke-width="2.5"/>';
        }
      }

      for (const node of nodes) {
        const x = laneX(node.lane);
        const y = rowY(node.row);

        for (let p = 0; p < node.parents.length; p++) {
          const parent = commitMap.get(node.parents[p]);
          if (!parent) continue;

          if (node.onMain && parent.onMain && p === 0) continue;

          const px = laneX(parent.lane);
          const py = rowY(parent.row);
          const color = p === 0 ? laneColor(node.lane) : laneColor(parent.lane);
          const strokeW = p === 0 ? 2.5 : 2;

          if (node.lane === parent.lane) {
            lines += '<line x1="' + x + '" y1="' + y + '" x2="' + px + '" y2="' + py
              + '" stroke="' + color + '" stroke-width="' + strokeW + '"/>';
          } else {
            const midY = (y + py) / 2;
            lines += '<path d="M ' + x + ' ' + y + ' C ' + x + ' ' + midY + ' ' + px + ' ' + midY + ' ' + px + ' ' + py
              + '" fill="none" stroke="' + color + '" stroke-width="' + strokeW + '"/>';
          }
        }
      }

      for (const node of nodes) {
        const x = laneX(node.lane);
        const y = rowY(node.row);
        const color = laneColor(node.lane);
        const isMerge = node.parents.length > 1;
        const shortHash = node.hash.substring(0, 7);
        const titleText = escapeHtml(shortHash + ' \u2014 ' + node.subject);

        dotGroups += '<g><title>' + titleText + '</title>';
        if (isMerge) {
          dotGroups += '<circle cx="' + x + '" cy="' + y + '" r="' + (COMMIT_R + 1)
            + '" fill="var(--color-surface, #1e1e2e)" stroke="' + color + '" stroke-width="2"/>';
        } else {
          dotGroups += '<circle cx="' + x + '" cy="' + y + '" r="' + COMMIT_R + '" fill="' + color + '"/>';
        }
        dotGroups += '</g>';

        if (node.refs.length > 0) {
          let refX = LABEL_X;
          for (const ref of node.refs) {
            const badgeW = Math.ceil(ref.length * CHAR_W) + 12;
            labels += '<g transform="translate(' + refX + ',' + (y - 8) + ')">'
              + '<rect rx="4" ry="4" width="' + badgeW + '" height="16" fill="' + color + '" opacity="0.2"/>'
              + '<text x="6" y="12" fill="' + color + '" font-size="10" font-weight="600" font-family="ui-monospace,monospace">'
              + escapeHtml(ref) + '</text></g>';
            refX += badgeW + 6;
          }
          labels += '<text x="' + (refX + 4) + '" y="' + (y + 4)
            + '" fill="var(--color-text-muted)" font-size="10" font-family="ui-monospace,monospace">'
            + escapeHtml(shortHash) + '</text>';
        }
      }

      container.innerHTML = '<div style="overflow-x:auto">'
        + '<svg class="bm__graph-svg" viewBox="0 0 ' + SVG_W + ' ' + SVG_H
        + '" width="' + SVG_W + '" height="' + SVG_H + '" xmlns="http://www.w3.org/2000/svg">'
        + lines + dotGroups + labels + '</svg></div>';
    }

    function showStats(id, commits) {
      const el = document.getElementById(id);
      if (!el || !commits) return;
      const mainCount = commits.filter(c => c.onMain).length;
      const branches = [...new Set(commits.filter(c => !c.onMain).map(c => c.branch))];
      el.textContent = commits.length + ' commits | ' + mainCount + ' on main | ' + branches.length + ' branches: ' + branches.join(', ');
    }

    function renderFromTextarea() {
      try {
        const data = JSON.parse(document.getElementById('json-input').value);
        renderCommitTree('branch-graph-client', data.client || []);
        renderCommitTree('branch-graph-api', data.api || []);
        showStats('stats-client', data.client);
        showStats('stats-api', data.api);
      } catch (e) {
        alert('Invalid JSON: ' + e.message);
      }
    }

    async function loadFromApi() {
      const url = document.getElementById('api-url').value;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        document.getElementById('json-input').value = JSON.stringify(data, null, 2);
        renderCommitTree('branch-graph-client', data.client || []);
        renderCommitTree('branch-graph-api', data.api || []);
        showStats('stats-client', data.client);
        showStats('stats-api', data.api);
      } catch (e) {
        alert('Fetch failed: ' + e.message);
      }
    }

    function loadSample() {
      const sample = {
        client: [
          { hash: 'aaa1111', parents: ['aaa2222'], date: '2026-04-14T22:00:00+10:00', subject: 'Merge branch dev/feature-a', refs: ['main'], onMain: true, branch: 'main' },
          { hash: 'bbb1111', parents: ['bbb2222'], date: '2026-04-14T21:00:00+10:00', subject: 'feat: add button animation', refs: ['dev/feature-a'], onMain: false, branch: 'dev/feature-a' },
          { hash: 'aaa2222', parents: ['aaa3333'], date: '2026-04-14T20:00:00+10:00', subject: 'fix: correct color palette', refs: [], onMain: true, branch: 'main' },
          { hash: 'bbb2222', parents: ['aaa3333'], date: '2026-04-14T19:00:00+10:00', subject: 'feat: initial button work', refs: [], onMain: false, branch: 'dev/feature-a' },
          { hash: 'ccc1111', parents: ['ccc2222'], date: '2026-04-14T18:00:00+10:00', subject: 'refactor: extract utils', refs: ['dev/refactor-utils'], onMain: false, branch: 'dev/refactor-utils' },
          { hash: 'aaa3333', parents: ['aaa4444'], date: '2026-04-14T17:00:00+10:00', subject: 'Merge branch dev/bugfix', refs: [], onMain: true, branch: 'main' },
          { hash: 'ccc2222', parents: ['aaa4444'], date: '2026-04-14T16:00:00+10:00', subject: 'refactor: move helpers', refs: [], onMain: false, branch: 'dev/refactor-utils' },
          { hash: 'aaa4444', parents: ['aaa5555'], date: '2026-04-13T22:00:00+10:00', subject: 'chore: update deps', refs: [], onMain: true, branch: 'main' },
          { hash: 'aaa5555', parents: [], date: '2026-04-13T20:00:00+10:00', subject: 'initial commit', refs: [], onMain: true, branch: 'main' },
        ],
        api: [
          { hash: 'ddd1111', parents: ['ddd2222'], date: '2026-04-14T21:00:00+10:00', subject: 'feat: add graph endpoint', refs: ['main'], onMain: true, branch: 'main' },
          { hash: 'ddd2222', parents: ['ddd3333'], date: '2026-04-14T19:00:00+10:00', subject: 'fix: auth middleware', refs: [], onMain: true, branch: 'main' },
          { hash: 'ddd3333', parents: [], date: '2026-04-13T18:00:00+10:00', subject: 'initial setup', refs: [], onMain: true, branch: 'main' },
        ]
      };
      document.getElementById('json-input').value = JSON.stringify(sample, null, 2);
      renderCommitTree('branch-graph-client', sample.client);
      renderCommitTree('branch-graph-api', sample.api);
      showStats('stats-client', sample.client);
      showStats('stats-api', sample.api);
    }
  </script>
</body>
</html>
