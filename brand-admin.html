<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarkedIt — Brand Admin</title>
    <link rel="stylesheet" href="css/base.css?v=1.06.0193">
    <link rel="stylesheet" href="css/components/auth.css?v=1.06.0193">
    <link rel="stylesheet" href="css/components/admin-header.css?v=1.06.0193">
    <link rel="stylesheet" href="css/dashboard.css?v=1.06.0193">
    <style>
        .brand-admin { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        .brand-admin__header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .brand-admin__logo { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; background: #1a1a1a; }
        .brand-admin__title { font-size: 1.4rem; margin: 0; }
        .brand-admin__sub { color: #888; font-size: 0.85rem; margin: 0.15rem 0 0; }
        .brand-admin__section { margin-bottom: 2rem; }
        .brand-admin__section h2 { font-size: 1.1rem; margin: 0 0 1rem; color: #ccc; }
        .brand-admin__stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.75rem; }
        .brand-admin__stat { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 0.9rem 1rem; display: flex; flex-direction: column; gap: 0.25rem; }
        .brand-admin__stat-num { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .brand-admin__stat-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; }
        .brand-admin__table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .brand-admin__table th,
        .brand-admin__table td { padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid #333; }
        .brand-admin__table th { color: #888; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .brand-admin__table tr:hover { background: rgba(255,255,255,0.03); }
        .brand-admin__count { color: #888; font-size: 0.85rem; font-weight: 400; }
        .brand-admin__empty { color: #888; padding: 0.5rem 0; }
        .brand-admin__gate { display: flex; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
        .brand-admin__gate p { color: #888; margin-bottom: 1em; }
    </style>
    <script src="js/branch-banner.js"></script>
</head>
<body>
    <div id="app"></div>
    <script type="module">
    'use strict';

    import { guardPage } from './js/managers/page-permission-guard.js';
    import { renderAdminHeader, bindAdminHeader, resetAdminHeaderMenu } from './js/components/admin-header.js';
    import { getFirebaseConfig } from './js/firebase-config.js';
    import { resolveBrandId, renderStatsPanel, renderUsersPanel } from './js/brand-admin.js';

    // Cosmetic client guard (Host+). The real boundary is server-side
    // requireBrandOwner on every /brands/:id/* fetch below.
    await guardPage('brand-admin').catch((err) => { throw err; });

    const FIREBASE_CONFIG = getFirebaseConfig();

    let firebaseAuth = null;
    let authToken = null;
    let fbUserInfo = null;
    let currentUser = null;

    async function loadFirebaseAuth() {
      const [appMod, authMod] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js'),
      ]);
      const app = appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(FIREBASE_CONFIG);
      firebaseAuth = authMod.getAuth(app);
      return authMod;
    }

    function authFetch(url, opts = {}) {
      if (authToken) {
        opts.headers = { ...opts.headers, Authorization: `Bearer ${authToken}` };
      }
      return fetch(url, opts);
    }

    async function doSignOut() {
      const { signOut } = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js');
      await signOut(firebaseAuth);
      authToken = null;
      renderGate('Sign in to view your brand admin panel.', true);
    }

    function renderGate(msg, showSignIn = false) {
      const role = currentUser?.role || 'Host';
      const app = document.getElementById('app');
      app.innerHTML = `
        ${renderAdminHeader({ user: fbUserInfo, role })}
        <div class="brand-admin__gate">
          <div>
            <h1>Brand Admin</h1>
            <p>${msg}</p>
            ${showSignIn ? '<button class="btn btn--google" id="sign-in-btn" style="font-size:1rem;padding:0.75em 1.5em">Sign in with Google</button>' : ''}
          </div>
        </div>`;
      bindAdminHeader(app, { user: fbUserInfo, role, onSignOut: doSignOut });
      if (showSignIn) {
        document.getElementById('sign-in-btn').addEventListener('click', async () => {
          const authMod = await loadFirebaseAuth();
          const provider = new authMod.GoogleAuthProvider();
          await authMod.signInWithPopup(firebaseAuth, provider);
        });
      }
    }

    function renderPanel(brand, stats, users) {
      resetAdminHeaderMenu();
      const app = document.getElementById('app');
      const role = currentUser?.role || 'Host';
      const logo = brand?.logo_url
        ? `<img class="brand-admin__logo" src="${brand.logo_url}" alt="" onerror="this.style.display='none'" />`
        : '';
      app.innerHTML = `
        ${renderAdminHeader({ user: fbUserInfo, role })}
        <div class="brand-admin">
          <div class="brand-admin__header">
            ${logo}
            <div>
              <h1 class="brand-admin__title">${brand?.name ? brand.name : 'Brand'} Admin</h1>
              <p class="brand-admin__sub">${brand?.slug ? 'play.carkedit.com/' + brand.slug : ''}</p>
            </div>
          </div>
          <section class="brand-admin__section">
            <h2>Game stats</h2>
            ${renderStatsPanel(stats)}
          </section>
          <section class="brand-admin__section">
            <h2>Signed-up accounts <span class="brand-admin__count">(${Array.isArray(users) ? users.length : 0})</span></h2>
            ${renderUsersPanel(users)}
          </section>
        </div>`;
      bindAdminHeader(app, { user: fbUserInfo, role, onSignOut: doSignOut });
    }

    async function fetchCurrentUser() {
      try {
        const res = await authFetch('/api/carkedit/users/me');
        if (res.ok) currentUser = await res.json();
      } catch (err) { /* non-fatal */ }
    }

    async function boot() {
      try {
        await fetchCurrentUser();

        // Discover the brand: explicit ?brand=<id> wins, else the user's own.
        const queryBrand = new URLSearchParams(location.search).get('brand');
        let myBrands = [];
        const mineRes = await authFetch('/api/carkedit/brands/mine');
        if (mineRes.status === 503) { renderGate('Authentication service unavailable.', false); return; }
        if (mineRes.status === 401) { renderGate('Sign in to view your brand admin panel.', true); return; }
        if (mineRes.ok) {
          const data = await mineRes.json();
          myBrands = data.brands || [];
        }

        const brandId = resolveBrandId(queryBrand, myBrands);
        if (!brandId) {
          renderGate('No brand is linked to your account yet. Request one to become an Evangelist.', false);
          return;
        }

        const [statsRes, usersRes] = await Promise.all([
          authFetch(`/api/carkedit/brands/${encodeURIComponent(brandId)}/stats`),
          authFetch(`/api/carkedit/brands/${encodeURIComponent(brandId)}/users`),
        ]);

        if (statsRes.status === 403 || usersRes.status === 403) {
          renderGate("You don't have access to this brand.", false);
          return;
        }
        if (statsRes.status === 404) { renderGate('Brand not found.', false); return; }
        if (statsRes.status === 503 || usersRes.status === 503) {
          renderGate('Authentication service unavailable.', false); return;
        }
        if (!statsRes.ok || !usersRes.ok) { renderGate('Failed to load brand data.', false); return; }

        const statsData = await statsRes.json();
        const usersData = await usersRes.json();
        const brand = myBrands.find((b) => b.id === brandId) || null;
        renderPanel(brand, statsData.stats, usersData.users);
      } catch (err) {
        renderGate('Failed to load brand admin panel.', false);
      }
    }

    // Init
    renderGate('Loading…', false);
    try {
      const authMod = await loadFirebaseAuth();
      authMod.onAuthStateChanged(firebaseAuth, async (user) => {
        if (user) {
          authToken = await user.getIdToken();
          fbUserInfo = { displayName: user.displayName, photoURL: user.photoURL, email: user.email };
          await boot();
        } else {
          authToken = null;
          fbUserInfo = null;
          renderGate('Sign in to view your brand admin panel.', true);
        }
      });
    } catch (err) {
      renderGate('Authentication service unavailable.', false);
    }
    </script>
</body>
</html>
