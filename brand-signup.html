<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarkedIt — Brand Sign-up</title>
    <link rel="stylesheet" href="css/base.css?v=1.09.0008">
    <link rel="stylesheet" href="css/components/auth.css?v=1.09.0008">
    <style>
        .brand-signup { max-width: 640px; margin: 0 auto; padding: 1.5rem; }
        .brand-signup__header { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin-bottom: 1.25rem; }
        .brand-signup__back { color: #b7d4e4; text-decoration: none; font-size: 0.9rem; }
        .brand-signup__back:hover { text-decoration: underline; }
        .brand-signup__title { font-size: 1.4rem; margin: 0; text-align: center; flex: 1; }
        .brand-signup__intro { opacity: 0.75; font-size: 0.9rem; margin: 0 0 1.25rem; }
        .brand-signup__intro code { background: rgba(0,0,0,0.35); padding: 0.05em 0.4em; border-radius: 4px; }
        .brand-signup__gate { opacity: 0.8; margin: 1rem 0; }
        .brand-signup__form { display: flex; flex-direction: column; gap: 0.85rem; }
        .brand-signup__field { display: flex; flex-direction: column; gap: 0.25rem; }
        .brand-signup__field span { font-size: 0.85rem; opacity: 0.7; }
        .brand-signup__field input {
            padding: 0.6em 0.75em; font-size: 0.95rem; border: 1px solid #555;
            border-radius: 6px; background: #1a1a1a; color: #eee;
        }
        .brand-signup__field input:focus { outline: none; border-color: #888; }
        .brand-signup__plan-value {
            margin: 0; padding: 0.6em 0.75em; font-size: 0.95rem; font-weight: 600;
            border: 1px solid #555; border-radius: 6px; background: #1a1a1a; color: #eee;
        }
        .brand-signup__slug-hint { font-size: 0.8rem; opacity: 0.75; margin: -0.55rem 0 0; font-family: monospace; }
        .brand-signup__slug-hint--ok  { color: #6fdc8c; opacity: 1; }
        .brand-signup__slug-hint--err { color: #ff6b6b; opacity: 1; }
        .brand-signup__actions { display: flex; align-items: center; gap: 1rem; margin-top: 0.25rem; }
        .brand-signup__status { font-size: 0.9rem; opacity: 0.85; }
        .brand-signup__status--ok  { color: #6fdc8c; }
        .brand-signup__status--err { color: #ff6b6b; }
        .brand-signup__note { font-size: 0.78rem; opacity: 0.55; margin: 0.25rem 0 0; }
        .brand-signup__brands { margin-bottom: 1.5rem; }
        .brand-signup__brands-title { font-size: 1rem; margin: 0 0 0.5rem; opacity: 0.85; }
        .brand-signup__brands-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 0.4rem; }
        .brand-signup__brand {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.5rem 0.7rem; background: rgba(0,0,0,0.3); border-radius: 6px; font-size: 0.85rem;
        }
        .brand-signup__brand-logo { width: 28px; height: 28px; border-radius: 6px; object-fit: contain; background: #1a1a1a; flex: 0 0 auto; }
        .brand-signup__brand-logo--empty { background: rgba(255,255,255,0.06); }
        .brand-signup__brand-slug { font-family: monospace; opacity: 0.9; white-space: nowrap; }
        .brand-signup__brand-name { opacity: 0.7; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .brand-signup__brand-status { font-weight: 600; font-size: 0.72rem; padding: 0.12em 0.6em; border-radius: 4px; }
        .brand-signup__brand-status--pending   { background: #5a4a1e; color: #f0d999; }
        .brand-signup__brand-status--approved  { background: #234a2e; color: #9fe0b3; }
        .brand-signup__brand-status--rejected  { background: #5a2424; color: #e7a3a3; }
        .brand-signup__brand-status--suspended { background: #3a3a3a; color: #aaa; }
    </style>
    <script src="js/branch-banner.js"></script>
</head>
<body>
    <div id="app"></div>
    <script type="module">
    'use strict';

    import { guardPage } from './js/managers/page-permission-guard.js';
    import { getFirebaseConfig } from './js/firebase-config.js';
    import { ROLE_LABELS } from './js/config/brand-labels.js';
    import { renderRequestForm, renderMyBrands, normalisePlan } from './js/brand-signup.js';
    import { escapeHtml } from './js/utils/escape.js';

    // Player-level page: renders for everyone; submit needs a token (backend
    // stays requireAuth). guardPage still honours an admin role override.
    await guardPage('brand-signup').catch((err) => { throw err; });

    const EVANGELIST = ROLE_LABELS.evangelist.singular;
    document.title = `CarkedIt — Become a ${EVANGELIST}`;   // configurable label, not hardcoded "Partner"
    // Plan tier chosen on the pricing page (?plan=…); null when reached directly.
    const SELECTED_PLAN = normalisePlan(new URLSearchParams(window.location.search).get('plan'));
    const FIREBASE_CONFIG = getFirebaseConfig();

    let firebaseAuth = null;
    let authToken = null;
    let slugTimer = null;

    async function loadFirebaseAuth() {
      const [appMod, authMod] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js'),
      ]);
      const app = appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(FIREBASE_CONFIG);
      firebaseAuth = authMod.getAuth(app);
      return authMod;
    }

    function authFetch(url, opts = {}) {
      if (authToken) opts.headers = { ...opts.headers, Authorization: `Bearer ${authToken}` };
      return fetch(url, opts);
    }

    function shell(inner) {
      return `<div class="brand-signup">
        <div class="brand-signup__header">
          <a class="brand-signup__back" href="index.html">← Back</a>
          <h1 class="brand-signup__title">Become a ${escapeHtml(EVANGELIST)}</h1>
          <span></span>
        </div>
        ${inner}
      </div>`;
    }

    function renderSignedOut() {
      document.getElementById('app').innerHTML = shell(`
        <p class="brand-signup__intro">Run co-branded games at your own URL (<code>carkedit.com/your-url</code>).</p>
        <p class="brand-signup__gate">Sign in to apply.</p>
        <button class="btn btn--primary" id="sign-in-btn">Sign in with Google</button>
      `);
      document.getElementById('sign-in-btn').addEventListener('click', async () => {
        const authMod = await loadFirebaseAuth();
        const provider = new authMod.GoogleAuthProvider();
        await authMod.signInWithPopup(firebaseAuth, provider);
      });
    }

    function renderForm() {
      document.getElementById('app').innerHTML = shell(`
        <p class="brand-signup__intro">Run co-branded games at your own URL
          (<code>carkedit.com/your-url</code>). Submit a request and an admin will review it.</p>
        <div id="my-brands"></div>
        ${renderRequestForm(EVANGELIST, SELECTED_PLAN)}
      `);
      loadMyBrands();
    }

    async function loadMyBrands() {
      try {
        const res = await authFetch('/api/carkedit/brands/mine');
        if (!res.ok) return;
        const data = await res.json().catch(() => ({}));
        const m = document.getElementById('my-brands');
        if (m) m.innerHTML = renderMyBrands(data.brands || []);
      } catch (err) { /* non-fatal */ }
    }

    // Controller referenced by the form's inline onsubmit/oninput.
    window.brandSignup = {
      async submit(event) {
        if (event) event.preventDefault();
        const nameEl = document.getElementById('brand-request-name');
        const slugEl = document.getElementById('brand-request-slug');
        const logoEl = document.getElementById('brand-request-logo');
        const status = document.getElementById('brand-request-status');
        if (!nameEl || !slugEl) return false;
        const name = nameEl.value.trim();
        const slug = slugEl.value.trim().toLowerCase();
        const setStatus = (msg, cls) => { if (status) { status.textContent = msg; status.className = `brand-signup__status${cls ? ' ' + cls : ''}`; } };
        if (!name || !slug) { setStatus('Name and URL are required', 'brand-signup__status--err'); return false; }
        if (!authToken) { setStatus('Please sign in first', 'brand-signup__status--err'); return false; }
        setStatus('Submitting…');
        const form = new FormData();
        form.append('name', name);
        form.append('slug', slug);
        if (SELECTED_PLAN) form.append('plan', SELECTED_PLAN);
        if (logoEl?.files?.[0]) form.append('logo', logoEl.files[0]);
        try {
          // No Content-Type — the browser sets the multipart boundary.
          const res = await authFetch('/api/carkedit/brands', { method: 'POST', body: form });
          const data = await res.json().catch(() => ({}));
          if (res.ok) {
            setStatus('Request submitted — pending review', 'brand-signup__status--ok');
            nameEl.value = ''; slugEl.value = ''; if (logoEl) logoEl.value = '';
            const hint = document.getElementById('brand-slug-hint');
            if (hint) { hint.textContent = 'carkedit.com/<your-url>'; hint.className = 'brand-signup__slug-hint'; }
            loadMyBrands();
          } else {
            setStatus(data.error || 'Request failed', 'brand-signup__status--err');
          }
        } catch (err) {
          setStatus('Network error', 'brand-signup__status--err');
        }
        return false;
      },
      checkSlug() {
        const slugEl = document.getElementById('brand-request-slug');
        const hint = document.getElementById('brand-slug-hint');
        if (!slugEl || !hint) return;
        const slug = slugEl.value.trim().toLowerCase();
        clearTimeout(slugTimer);
        if (!slug) { hint.textContent = 'carkedit.com/<your-url>'; hint.className = 'brand-signup__slug-hint'; return; }
        hint.textContent = `carkedit.com/${slug} — checking…`;
        hint.className = 'brand-signup__slug-hint';
        slugTimer = setTimeout(async () => {
          if (!authToken) { hint.textContent = 'Sign in to check availability'; hint.className = 'brand-signup__slug-hint'; return; }
          try {
            const res = await authFetch(`/api/carkedit/brands/slug-available/${encodeURIComponent(slug)}`);
            const data = await res.json().catch(() => ({}));
            if (slugEl.value.trim().toLowerCase() !== slug) return; // input changed mid-flight
            if (data.available) {
              hint.textContent = `carkedit.com/${slug} — available`;
              hint.className = 'brand-signup__slug-hint brand-signup__slug-hint--ok';
            } else {
              hint.textContent = data.reason || `carkedit.com/${slug} — unavailable`;
              hint.className = 'brand-signup__slug-hint brand-signup__slug-hint--err';
            }
          } catch (err) { /* leave the checking… hint */ }
        }, 400);
      },
    };

    // Init
    document.getElementById('app').innerHTML = shell('<p class="brand-signup__gate">Loading…</p>');
    try {
      const authMod = await loadFirebaseAuth();
      authMod.onAuthStateChanged(firebaseAuth, async (user) => {
        if (user) {
          authToken = await user.getIdToken();
          renderForm();
        } else {
          authToken = null;
          renderSignedOut();
        }
      });
    } catch (err) {
      document.getElementById('app').innerHTML = shell('<p class="brand-signup__gate">Authentication service unavailable.</p>');
    }
    </script>
</body>
</html>
