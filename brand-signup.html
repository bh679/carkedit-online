<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarkedIt — Brand Sign-up</title>
    <link rel="stylesheet" href="css/base.css?v=1.09.0008">
    <link rel="stylesheet" href="css/components/auth.css?v=1.09.0008">
    <!-- Styling mirrors the Evangelist pricing page (css/screens/evangelist-pricing.css):
         design tokens only, same header / surface-card / input look. -->
    <style>
        /* Scrollable info page (game screens lock the body). */
        body.page--brand-signup { overflow-y: auto; height: auto; min-height: 100dvh; }
        body.page--brand-signup #app { overflow: visible; height: auto; min-height: 100dvh; }

        .brand-signup {
            display: flex; flex-direction: column; gap: var(--space-lg);
            width: 100%; padding: var(--space-md) var(--space-md) var(--space-xl);
        }

        /* Header — same pattern as the pricing page. */
        .brand-signup__header { position: relative; text-align: center; padding-top: var(--space-lg); }
        .brand-signup__back {
            position: absolute; top: 0; left: 0; color: var(--color-text-muted);
            text-decoration: none; font-size: 0.9rem; font-weight: 600; padding: var(--space-xs) 0;
        }
        .brand-signup__back:hover { color: var(--color-text); }
        .brand-signup__logo { width: min(120px, 28vw); display: block; margin: 0 auto var(--space-sm); }
        .brand-signup__title {
            font-size: 2rem; font-weight: 800; color: var(--color-primary);
            letter-spacing: -0.5px; margin: 0;
        }
        .brand-signup__subtitle { font-size: 1rem; color: var(--color-text-muted); margin-top: var(--space-xs); }

        .brand-signup__intro { color: var(--color-text-90); line-height: 1.5; }
        .brand-signup__intro code { background: var(--color-input-bg); padding: 0.05em 0.4em; border-radius: var(--radius-sm); }
        .brand-signup__gate { color: var(--color-text-90); margin: var(--space-sm) 0; }

        /* Form on a surface card, token-styled inputs. */
        .brand-signup__form {
            display: flex; flex-direction: column; gap: var(--space-md);
            background: var(--color-surface); border: 1px solid var(--color-border);
            border-radius: var(--radius-md); padding: var(--space-md);
        }
        .brand-signup__field { display: flex; flex-direction: column; gap: var(--space-xs); }
        .brand-signup__field span { font-size: 0.85rem; color: var(--color-text-muted); }
        .brand-signup__field input, .brand-signup__plan-select {
            padding: 0.6em 0.75em; font-size: 0.95rem; border: 1px solid var(--color-border);
            border-radius: var(--radius-sm); background: var(--color-input-bg); color: var(--color-text);
        }
        .brand-signup__field input:focus, .brand-signup__plan-select:focus { outline: none; border-color: var(--color-primary); }
        .brand-signup__slug-hint { font-size: 0.8rem; color: var(--color-text-muted); margin: calc(var(--space-xs) * -1) 0 0; font-family: monospace; }
        .brand-signup__slug-hint--ok  { color: var(--color-live); }
        .brand-signup__slug-hint--err { color: var(--color-danger); }
        .brand-signup__actions { display: flex; flex-direction: column; align-items: stretch; gap: var(--space-sm); margin-top: var(--space-xs); }
        .brand-signup__submit { width: 100%; }
        .brand-signup__status { font-size: 0.9rem; color: var(--color-text-90); text-align: center; }
        .brand-signup__status--ok  { color: var(--color-live); }
        .brand-signup__status--err { color: var(--color-danger); }
        .brand-signup__note { font-size: 0.78rem; color: var(--color-text-muted); margin: var(--space-xs) 0 0; }

        /* "Your requests" — surface cards, matching the pricing tiers. */
        .brand-signup__brands { display: flex; flex-direction: column; gap: var(--space-sm); }
        .brand-signup__brands-title { font-size: 1.25rem; font-weight: 800; color: var(--color-text); margin: 0; }
        .brand-signup__brands-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: var(--space-xs); }
        .brand-signup__brand {
            display: flex; align-items: center; gap: var(--space-sm);
            padding: var(--space-sm) var(--space-md); background: var(--color-surface);
            border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 0.85rem;
        }
        .brand-signup__brand-logo { width: 28px; height: 28px; border-radius: var(--radius-sm); object-fit: contain; background: var(--color-input-bg); flex: 0 0 auto; }
        .brand-signup__brand-logo--empty { background: var(--color-input-bg); }
        .brand-signup__brand-slug { font-family: monospace; color: var(--color-text-90); white-space: nowrap; }
        .brand-signup__brand-name { color: var(--color-text-muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .brand-signup__brand-status { font-weight: 600; font-size: 0.72rem; padding: 0.12em 0.6em; border-radius: var(--radius-sm); }
        /* Semantic status colours (state-specific; kept distinct from theme tokens). */
        .brand-signup__brand-status--pending   { background: #5a4a1e; color: #f0d999; }
        .brand-signup__brand-status--approved  { background: #234a2e; color: #9fe0b3; }
        .brand-signup__brand-status--rejected  { background: #5a2424; color: #e7a3a3; }
        .brand-signup__brand-status--suspended { background: #3a3a3a; color: #aaa; }
    </style>
    <script src="js/branch-banner.js"></script>
</head>
<body class="page--brand-signup">
    <div id="app"></div>
    <script type="module">
    'use strict';

    import { guardPage } from './js/managers/page-permission-guard.js';
    import { getFirebaseConfig } from './js/firebase-config.js';
    import { ROLE_LABELS } from './js/config/brand-labels.js';
    import { renderRequestForm, renderMyBrands, normalisePlan } from './js/brand-signup.js';
    import { escapeHtml } from './js/utils/escape.js';

    // Player-level page: renders for everyone; submit needs a token (backend
    // stays requireAuth). guardPage still honours an admin role override.
    await guardPage('brand-signup').catch((err) => { throw err; });

    const EVANGELIST = ROLE_LABELS.evangelist.singular;
    document.title = `CarkedIt — Become a ${EVANGELIST}`;   // configurable label, not hardcoded "Partner"
    // Plan tier chosen on the pricing page (?plan=…); null when reached directly.
    const SELECTED_PLAN = normalisePlan(new URLSearchParams(window.location.search).get('plan'));
    const FIREBASE_CONFIG = getFirebaseConfig();

    let firebaseAuth = null;
    let authToken = null;
    let slugTimer = null;

    async function loadFirebaseAuth() {
      const [appMod, authMod] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js'),
      ]);
      const app = appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(FIREBASE_CONFIG);
      firebaseAuth = authMod.getAuth(app);
      return authMod;
    }

    function authFetch(url, opts = {}) {
      if (authToken) opts.headers = { ...opts.headers, Authorization: `Bearer ${authToken}` };
      return fetch(url, opts);
    }

    function shell(inner) {
      return `<div class="brand-signup">
        <header class="brand-signup__header">
          <a class="brand-signup__back" href="evangelist-pricing" aria-label="Back to pricing">← Pricing</a>
          <img class="brand-signup__logo" src="assets/CarkedIt-skull.webp" alt=""
            onerror="this.style.display='none'" />
          <h1 class="brand-signup__title">Become a ${escapeHtml(EVANGELIST)}</h1>
          <p class="brand-signup__subtitle">Run co-branded games at your own URL</p>
        </header>
        ${inner}
      </div>`;
    }

    function renderSignedOut() {
      document.getElementById('app').innerHTML = shell(`
        <p class="brand-signup__intro">Your own vanity URL: <code>play.carkedit.com/your-url</code>.</p>
        <p class="brand-signup__gate">Sign in to apply.</p>
        <button class="btn btn--primary" id="sign-in-btn">Sign in with Google</button>
      `);
      document.getElementById('sign-in-btn').addEventListener('click', async () => {
        const authMod = await loadFirebaseAuth();
        const provider = new authMod.GoogleAuthProvider();
        await authMod.signInWithPopup(firebaseAuth, provider);
      });
    }

    function renderForm() {
      document.getElementById('app').innerHTML = shell(`
        <p class="brand-signup__intro">Submit a request and an admin will review it.</p>
        <div id="my-brands"></div>
        ${renderRequestForm(EVANGELIST, SELECTED_PLAN)}
      `);
      loadMyBrands();
    }

    async function loadMyBrands() {
      try {
        const res = await authFetch('/api/carkedit/brands/mine');
        if (!res.ok) return;
        const data = await res.json().catch(() => ({}));
        const m = document.getElementById('my-brands');
        if (m) m.innerHTML = renderMyBrands(data.brands || []);
      } catch (err) { /* non-fatal */ }
    }

    // Controller referenced by the form's inline onsubmit/oninput.
    window.brandSignup = {
      async submit(event) {
        if (event) event.preventDefault();
        const nameEl = document.getElementById('brand-request-name');
        const slugEl = document.getElementById('brand-request-slug');
        const logoEl = document.getElementById('brand-request-logo');
        const status = document.getElementById('brand-request-status');
        if (!nameEl || !slugEl) return false;
        const name = nameEl.value.trim();
        const slug = slugEl.value.trim().toLowerCase();
        const setStatus = (msg, cls) => { if (status) { status.textContent = msg; status.className = `brand-signup__status${cls ? ' ' + cls : ''}`; } };
        if (!name || !slug) { setStatus('Name and URL are required', 'brand-signup__status--err'); return false; }
        if (!authToken) { setStatus('Please sign in first', 'brand-signup__status--err'); return false; }
        setStatus('Submitting…');
        const form = new FormData();
        form.append('name', name);
        form.append('slug', slug);
        const planEl = document.getElementById('brand-request-plan');
        const plan = normalisePlan(planEl?.value);
        if (plan) form.append('plan', plan);
        if (logoEl?.files?.[0]) form.append('logo', logoEl.files[0]);
        try {
          // No Content-Type — the browser sets the multipart boundary.
          const res = await authFetch('/api/carkedit/brands', { method: 'POST', body: form });
          const data = await res.json().catch(() => ({}));
          if (res.ok) {
            setStatus('Request submitted — pending review', 'brand-signup__status--ok');
            nameEl.value = ''; slugEl.value = ''; if (logoEl) logoEl.value = '';
            const hint = document.getElementById('brand-slug-hint');
            if (hint) { hint.textContent = 'play.carkedit.com/<your-url>'; hint.className = 'brand-signup__slug-hint'; }
            loadMyBrands();
          } else {
            setStatus(data.error || 'Request failed', 'brand-signup__status--err');
          }
        } catch (err) {
          setStatus('Network error', 'brand-signup__status--err');
        }
        return false;
      },
      checkSlug() {
        const slugEl = document.getElementById('brand-request-slug');
        const hint = document.getElementById('brand-slug-hint');
        if (!slugEl || !hint) return;
        const slug = slugEl.value.trim().toLowerCase();
        clearTimeout(slugTimer);
        if (!slug) { hint.textContent = 'play.carkedit.com/<your-url>'; hint.className = 'brand-signup__slug-hint'; return; }
        hint.textContent = `play.carkedit.com/${slug} — checking…`;
        hint.className = 'brand-signup__slug-hint';
        slugTimer = setTimeout(async () => {
          if (!authToken) { hint.textContent = 'Sign in to check availability'; hint.className = 'brand-signup__slug-hint'; return; }
          try {
            const res = await authFetch(`/api/carkedit/brands/slug-available/${encodeURIComponent(slug)}`);
            const data = await res.json().catch(() => ({}));
            if (slugEl.value.trim().toLowerCase() !== slug) return; // input changed mid-flight
            if (data.available) {
              hint.textContent = `play.carkedit.com/${slug} — available`;
              hint.className = 'brand-signup__slug-hint brand-signup__slug-hint--ok';
            } else {
              hint.textContent = data.reason || `play.carkedit.com/${slug} — unavailable`;
              hint.className = 'brand-signup__slug-hint brand-signup__slug-hint--err';
            }
          } catch (err) { /* leave the checking… hint */ }
        }, 400);
      },
    };

    // Init
    document.getElementById('app').innerHTML = shell('<p class="brand-signup__gate">Loading…</p>');
    try {
      const authMod = await loadFirebaseAuth();
      authMod.onAuthStateChanged(firebaseAuth, async (user) => {
        if (user) {
          authToken = await user.getIdToken();
          renderForm();
        } else {
          authToken = null;
          renderSignedOut();
        }
      });
    } catch (err) {
      document.getElementById('app').innerHTML = shell('<p class="brand-signup__gate">Authentication service unavailable.</p>');
    }
    </script>
</body>
</html>
