<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarkedIt Online - Deploying...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .deploy-container { max-width: 480px; width: 90%; text-align: center; padding: 2rem; }
    .deploy-title { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
    .deploy-subtitle { color: #aaa; margin-bottom: 1rem; }
    .deploy-target { color: #e94560; font-weight: bold; }
    .deploy-elapsed { color: #888; margin-bottom: 1.5rem; }
    .deploy-elapsed .time { color: #e94560; font-weight: bold; }
    .deploy-steps { text-align: left; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
    .deploy-steps h3 { margin-bottom: 0.75rem; font-size: 0.9rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; }
    .step { display: flex; align-items: center; gap: 0.5rem; padding: 0.35rem 0; font-size: 0.9rem; }
    .step-icon { width: 1.2em; text-align: center; }
    .step-icon.done { color: #4caf50; }
    .step-icon.active { color: #e94560; animation: pulse 1s infinite; }
    .step-icon.error { color: #f44336; }
    .step-name { flex: 1; }
    .step-name.pending { color: #666; }
    .step-time { color: #666; font-size: 0.8rem; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .deploy-complete .checkmark { font-size: 3rem; color: #4caf50; margin-bottom: 1rem; }
    .deploy-idle .icon { font-size: 3rem; margin-bottom: 1rem; }
    .home-link { display: inline-block; margin-top: 1rem; color: #e94560; text-decoration: none; }
    .home-link:hover { text-decoration: underline; }
    .deploy-reconnecting { background: #e94560; color: white; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 1rem; animation: pulse 2s infinite; }
    .deploy-history { margin-top: 1rem; text-align: left; }
    .deploy-history summary { cursor: pointer; color: #888; font-size: 0.85rem; }
    .history-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.3rem 0; font-size: 0.8rem; color: #888; }
    .history-status { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .history-status.success { background: #4caf50; }
    .history-status.failed { background: #f44336; }
    .history-target { font-weight: bold; color: #aaa; min-width: 4em; }
  </style>
  <script src="js/branch-banner.js"></script>
</head>
<body>
  <div class="deploy-container">
    <div id="deploy-active" style="display:none">
      <h1 class="deploy-title">Deploying Update</h1>
      <p class="deploy-subtitle">
        Target: <span class="deploy-target" id="deploy-target">--</span>
      </p>

      <div class="deploy-elapsed">
        Elapsed: <span class="time" id="deploy-elapsed">0s</span>
      </div>

      <div id="reconnecting-banner" class="deploy-reconnecting" style="display:none">
        Server restarting... waiting for reconnection
      </div>

      <div class="deploy-steps">
        <h3>Progress</h3>
        <div id="steps-list"></div>
      </div>
    </div>

    <div id="deploy-complete" class="deploy-complete" style="display:none">
      <div class="checkmark">&#10003;</div>
      <h1 class="deploy-title">Deployment Complete</h1>
      <p>Redirecting to the game in <span id="redirect-countdown">3</span>s...</p>
    </div>

    <div id="deploy-idle" class="deploy-idle" style="display:none">
      <div class="icon">&#127183;</div>
      <h2>No Active Deployment</h2>
      <p>The game is running normally.</p>
      <a href="./" class="home-link">Go to CarkedIt Online</a>
    </div>

    <details class="deploy-history" id="history-section" style="display:none">
      <summary>Deployment History</summary>
      <div class="history-list" id="history-list"></div>
    </details>
  </div>

  <script>
    (function () {
      'use strict';

      var POLL_INTERVAL = 2000;
      var REDIRECT_DELAY = 3;
      var STATUS_URL = 'deploy-status.json';

      var STEP_LABELS = {
        'starting':          'Starting deployment',
        'pulling-client':    'Pulling latest code',
        'complete':          'Deployment complete',
      };

      var STEP_ICONS = {
        done:    '\u2713',
        active:  '\u25E6',
        pending: '\u2022',
        error:   '\u2717',
      };

      var pollTimer = null;
      var elapsedTimer = null;
      var deployStartTime = null;
      var redirectTimer = null;
      var failCount = 0;

      var elActive   = document.getElementById('deploy-active');
      var elComplete = document.getElementById('deploy-complete');
      var elIdle     = document.getElementById('deploy-idle');
      var elTarget   = document.getElementById('deploy-target');
      var elElapsed  = document.getElementById('deploy-elapsed');
      var elSteps    = document.getElementById('steps-list');
      var elReconn   = document.getElementById('reconnecting-banner');
      var elHistory  = document.getElementById('history-section');
      var elHistList = document.getElementById('history-list');
      var elCountdown = document.getElementById('redirect-countdown');

      function formatDuration(seconds) {
        if (seconds < 60) return seconds + 's';
        var m = Math.floor(seconds / 60);
        var s = seconds % 60;
        return m + 'm ' + s + 's';
      }

      function formatDate(iso) {
        try {
          var d = new Date(iso);
          return d.toLocaleDateString(undefined, {
            month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
          });
        } catch (_) {
          return iso;
        }
      }

      function showSection(section) {
        elActive.style.display   = section === 'active'   ? '' : 'none';
        elComplete.style.display = section === 'complete' ? '' : 'none';
        elIdle.style.display     = section === 'idle'     ? '' : 'none';
      }

      function renderSteps(steps) {
        elSteps.innerHTML = '';
        (steps || []).forEach(function (step) {
          var div = document.createElement('div');
          div.className = 'step';

          var icon = document.createElement('span');
          icon.className = 'step-icon ' + (step.status || 'pending');
          icon.textContent = STEP_ICONS[step.status] || STEP_ICONS.pending;

          var name = document.createElement('span');
          name.className = 'step-name' + (step.status === 'pending' ? ' pending' : '');
          name.textContent = STEP_LABELS[step.name] || step.name;

          var time = document.createElement('span');
          time.className = 'step-time';
          if (step.time) {
            var d = new Date(step.time);
            time.textContent = d.toLocaleTimeString(undefined, {
              hour: '2-digit', minute: '2-digit', second: '2-digit',
            });
          }

          div.appendChild(icon);
          div.appendChild(name);
          div.appendChild(time);
          elSteps.appendChild(div);
        });
      }

      function renderHistory(history) {
        if (!history || history.length === 0) {
          elHistory.style.display = 'none';
          return;
        }
        elHistory.style.display = '';
        elHistList.innerHTML = '';

        history.forEach(function (item) {
          var div = document.createElement('div');
          div.className = 'history-item';

          var dot = document.createElement('span');
          dot.className = 'history-status ' + (item.status || 'success');

          var target = document.createElement('span');
          target.className = 'history-target';
          target.textContent = (item.target || 'unknown').toUpperCase();

          var date = document.createElement('span');
          date.className = 'history-date';
          date.textContent = formatDate(item.startedAt);

          var dur = document.createElement('span');
          dur.className = 'history-duration';
          dur.textContent = item.duration != null ? formatDuration(item.duration) : '--';

          div.appendChild(dot);
          div.appendChild(target);
          div.appendChild(date);
          div.appendChild(dur);
          elHistList.appendChild(div);
        });
      }

      function updateElapsed() {
        if (!deployStartTime) return;
        var seconds = Math.floor((Date.now() - deployStartTime) / 1000);
        elElapsed.textContent = formatDuration(seconds);
      }

      function handleStatus(data) {
        failCount = 0;
        elReconn.style.display = 'none';

        renderHistory(data.history);

        if (data.deploying) {
          showSection('active');
          elTarget.textContent = (data.target || 'unknown').toUpperCase();

          if (data.startedAt) {
            deployStartTime = new Date(data.startedAt).getTime();
          }
          if (!elapsedTimer) {
            elapsedTimer = setInterval(updateElapsed, 1000);
            updateElapsed();
          }

          renderSteps(data.steps);
        } else {
          if (deployStartTime) {
            showSection('complete');
            clearInterval(elapsedTimer);
            elapsedTimer = null;
            startRedirect();
          } else {
            showSection('idle');
          }
        }
      }

      function handleFetchError() {
        failCount++;
        if (deployStartTime) {
          elReconn.style.display = '';
        }
        if (!deployStartTime && failCount > 5) {
          showSection('idle');
          renderHistory([]);
        }
      }

      function poll() {
        fetch(STATUS_URL + '?t=' + Date.now())
          .then(function (res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
          })
          .then(handleStatus)
          .catch(handleFetchError);
      }

      function startRedirect() {
        var count = REDIRECT_DELAY;
        elCountdown.textContent = count;
        clearInterval(pollTimer);
        redirectTimer = setInterval(function () {
          count--;
          elCountdown.textContent = count;
          if (count <= 0) {
            clearInterval(redirectTimer);
            window.location.href = './';
          }
        }, 1000);
      }

      poll();
      pollTimer = setInterval(poll, POLL_INTERVAL);
    })();
  </script>
</body>
</html>
