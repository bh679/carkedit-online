<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarkedIt — Deploy</title>
    <link rel="stylesheet" href="css/base.css?v=1.06.0156">
    <link rel="stylesheet" href="css/components/auth.css?v=1.06.0156">
    <link rel="stylesheet" href="css/components/admin-header.css?v=1.06.0156">
    <link rel="stylesheet" href="css/dashboard.css?v=1.06.0156">
    <style>
        .dp { max-width: 760px; margin: 0 auto; padding: var(--space-md) var(--space-lg); }
        .dp__gate { display: flex; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
        .dp__gate h1 { font-size: 1.4rem; margin-bottom: var(--space-xs); }
        .dp__gate p { color: var(--color-text-muted); margin-bottom: var(--space-md); font-size: 0.95rem; }
        .dp__gate .btn { display: inline-block; padding: 0.8rem 1.5rem; background: var(--color-primary); color: #fff;
            font-weight: 700; border-radius: var(--radius-sm); text-decoration: none; font-size: 1rem; border: none; cursor: pointer; }
        .dp__gate .btn:hover { filter: brightness(1.15); }
        .dp__missing { background: var(--color-surface, #1a1a2e); border: 1px solid var(--color-border, rgba(255,255,255,0.1));
            border-radius: var(--radius-md, 8px); padding: var(--space-lg); margin: var(--space-lg) 0; text-align: center; }
        .dp__missing h2 { margin: 0 0 var(--space-xs) 0; font-size: 1.1rem; }
        .dp__missing p { margin: var(--space-xs) 0; color: var(--color-text-muted); font-size: 0.9rem; }
        .dp__missing a { color: var(--color-primary); text-decoration: underline; }
        .dp__loading { color: var(--color-text-muted); text-align: center; font-size: 0.9rem; padding: var(--space-lg); }
    </style>
    <script src="js/branch-banner.js"></script>
</head>
<body>
    <div id="app"></div>
    <script type="module">
    import { renderAdminHeader, bindAdminHeader, resetAdminHeaderMenu } from './js/components/admin-header.js';

    if (window.location.hostname === 'brennan.games') {
        window.location.replace('branch-manager.php');
    }

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyC6QJz6jTzJkBWV7Shd9XpCfHWrovJ9vaI",
      authDomain: window.location.host,
      projectId: "carkedit-5cc8e",
      storageBucket: "carkedit-5cc8e.firebasestorage.app",
      messagingSenderId: "144073275425",
      appId: "1:144073275425:web:2301fbbccc2be69c654b60",
    };

    let firebaseAuth = null;
    let authModule = null;

    async function loadFirebase() {
      const [appMod, authMod] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js'),
      ]);
      const app = appMod.initializeApp(FIREBASE_CONFIG);
      firebaseAuth = authMod.getAuth(app);
      authModule = authMod;
    }

    function renderGate(msg, showSignIn = false) {
      resetAdminHeaderMenu();
      document.getElementById('app').innerHTML = `
        ${renderAdminHeader()}
        <div class="dp">
            <div class="dp__gate">
                <div>
                    <h1>Deploy</h1>
                    <p>${msg}</p>
                    ${showSignIn ? '<button class="btn" id="gate-sign-in">Sign in with Google</button>' : ''}
                </div>
            </div>
        </div>`;
      bindAdminHeader(document.getElementById('app'), {});
      const si = document.getElementById('gate-sign-in');
      if (si) {
        si.addEventListener('click', async () => {
          try {
            const provider = new authModule.GoogleAuthProvider();
            await authModule.signInWithPopup(firebaseAuth, provider);
          } catch (err) {
            renderGate('Sign-in failed: ' + (err.message || err), true);
          }
        });
      }
    }

    function renderShell() {
      resetAdminHeaderMenu();
      document.getElementById('app').innerHTML = `
        ${renderAdminHeader()}
        <div class="dp">
            <div id="deploy-mount">
              <div class="dp__loading">Loading deployment system…</div>
            </div>
        </div>`;
      bindAdminHeader(document.getElementById('app'), {});
    }

    async function fetchDeployToken(user) {
      const idToken = await user.getIdToken();
      const res = await fetch('/api/admin/deploy-token', {
        headers: { Authorization: 'Bearer ' + idToken },
      });
      if (!res.ok) {
        let body = '';
        try { body = await res.text(); } catch (_) { /* ignore */ }
        const err = new Error('HTTP ' + res.status + (body ? ' — ' + body.slice(0, 200) : ''));
        err.status = res.status;
        throw err;
      }
      const data = await res.json();
      // carkedit-deploy's auth.ts accepts either token (timing-safe-compares
      // against both .deploy-token-carkedit-{api,online} files), so either
      // value works for the injected fragment. Prefer api as canonical.
      return data.api || data.online;
    }

    async function mountDeploySystem(user) {
      const mount = document.getElementById('deploy-mount');
      if (!mount) return;

      // Step 1 — probe deploy service health.
      try {
        const probe = await fetch('/api/admin/deploy/health', { credentials: 'omit' });
        if (!probe.ok) throw new Error('health probe ' + probe.status);
      } catch (err) {
        mount.innerHTML = `
          <div class="dp__missing">
            <h2>Can't find deployment system</h2>
            <p>The carkedit-deploy service is not reachable on this server.</p>
            <p><strong>To install:</strong> follow the README at
              <a href="https://github.com/bh679/carkedit-deploy" target="_blank" rel="noopener noreferrer">
                github.com/bh679/carkedit-deploy
              </a>
              and add the matching Apache reverse-proxy entry.</p>
            <p style="font-size: 0.78rem; opacity: 0.6;">Probe error: ${(err && err.message) || err}</p>
          </div>`;
        return;
      }

      // Step 2 — fetch deploy token from carkedit-api (Session B's endpoint).
      let deployToken;
      try {
        deployToken = await fetchDeployToken(user);
      } catch (err) {
        mount.innerHTML = `
          <div class="dp__missing">
            <h2>Deploy token endpoint missing</h2>
            <p>The carkedit-api service does not expose <code>/api/admin/deploy-token</code> on this server.</p>
            <p>This usually means <strong>Session B</strong> of the deploy migration has not been deployed yet,
              or the signed-in user is not an admin.</p>
            <p style="font-size: 0.78rem; opacity: 0.6;">Error: ${(err && err.message) || err}</p>
          </div>`;
        return;
      }

      // Step 3 — expose the contract the injected fragment consumes.
      window.__cdGetDeployToken = async () => deployToken;

      // Step 4 — fetch + inject the UI fragment.
      try {
        const fragmentRes = await fetch('/api/admin/deploy/ui');
        if (!fragmentRes.ok) throw new Error('fragment fetch ' + fragmentRes.status);
        const html = await fragmentRes.text();
        mount.innerHTML = html;

        // Load the fragment's CSS and JS as siblings.
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = '/api/admin/deploy/ui.css';
        document.head.appendChild(link);

        const script = document.createElement('script');
        script.type = 'module';
        script.src = '/api/admin/deploy/ui.js';
        document.body.appendChild(script);
      } catch (err) {
        mount.innerHTML = `
          <div class="dp__missing">
            <h2>Deploy UI fragment failed to load</h2>
            <p>The deploy service health probe and token fetch succeeded, but the UI fragment did not load.</p>
            <p style="font-size: 0.78rem; opacity: 0.6;">Error: ${(err && err.message) || err}</p>
          </div>`;
      }
    }

    // Boot
    renderGate('Loading…', false);

    try {
      await loadFirebase();
    } catch (err) {
      renderGate('Failed to load Firebase — check your network.', false);
    }

    authModule.onAuthStateChanged(firebaseAuth, async (user) => {
      if (!user) {
        renderGate('Sign in with an admin Google account to continue.', true);
        return;
      }
      renderShell();
      // mountDeploySystem handles its own error states inside #deploy-mount.
      mountDeploySystem(user);
    });
    </script>
</body>
</html>
