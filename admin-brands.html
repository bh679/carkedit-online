<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarkedIt — Brand Requests</title>
    <link rel="stylesheet" href="css/base.css?v=1.09.0008">
    <link rel="stylesheet" href="css/components/auth.css?v=1.09.0008">
    <link rel="stylesheet" href="css/components/admin-header.css?v=1.09.0008">
    <link rel="stylesheet" href="css/dashboard.css?v=1.09.0008">
    <style>
        .admin-brands { max-width: 1000px; margin: 0 auto; padding: 1.5rem; }
        .admin-brands__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.75rem; }
        .admin-brands__title { font-size: 1.4rem; margin: 0; }
        .admin-brands__count { color: #888; font-size: 0.85rem; }
        .admin-brands__filter { color: #888; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem; }
        .admin-brands__filter select { padding: 0.3em 0.6em; font-size: 0.85rem; border: 1px solid #555; border-radius: 4px; background: #1a1a1a; color: #ccc; cursor: pointer; }
        .admin-brands__table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-brands__table th,
        .admin-brands__table td { padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid #333; vertical-align: middle; }
        .admin-brands__table th { color: #888; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .admin-brands__table tr:hover { background: rgba(255,255,255,0.03); }
        .admin-brands__logo { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; background: #222; display: inline-block; }
        .admin-brands__logo--empty { border: 1px dashed #444; }
        .admin-brands__slug { color: #b7d4e4; text-decoration: none; font-family: monospace; }
        a.admin-brands__slug:hover { text-decoration: underline; }
        .admin-brands__owner-email { color: #777; font-size: 0.75rem; }
        .admin-brands__badge { display: inline-block; padding: 0.15em 0.6em; border-radius: 4px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.02em; }
        .admin-brands__badge--pending   { background: #5a4a1e; color: #f0d999; }
        .admin-brands__badge--approved  { background: #234a2e; color: #9fe0b3; }
        .admin-brands__badge--rejected  { background: #5a2424; color: #e7a3a3; }
        .admin-brands__badge--suspended { background: #3a3a3a; color: #aaa; }
        .admin-brands__actions { white-space: nowrap; }
        .admin-brands__btn { padding: 0.32em 0.75em; font-size: 0.78rem; font-weight: 600; border: 1px solid #555; border-radius: 4px; background: #1a1a1a; color: #ccc; cursor: pointer; margin-right: 0.3rem; }
        .admin-brands__btn:hover:not(:disabled) { border-color: #888; color: #fff; }
        .admin-brands__btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .admin-brands__btn--approve:hover:not(:disabled) { border-color: #4caf72; color: #9fe0b3; }
        .admin-brands__btn--reject:hover:not(:disabled)  { border-color: #c45; color: #e7a3a3; }
        .admin-brands__btn--suspend:hover:not(:disabled) { border-color: #999; color: #ddd; }
        .admin-brands__empty { color: #888; padding: 2rem; text-align: center; }
        .admin-brands__gate { display: flex; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
        .admin-brands__gate p { color: #888; margin-bottom: 1em; }
    </style>
    <script src="js/branch-banner.js"></script>
</head>
<body>
    <div id="app"></div>
    <script type="module">
    'use strict';

    import { guardPage } from './js/managers/page-permission-guard.js';
    import { renderAdminHeader, bindAdminHeader, resetAdminHeaderMenu } from './js/components/admin-header.js';
    import { getFirebaseConfig } from './js/firebase-config.js';
    import { renderBrandsTable, filterOptions } from './js/admin-brands.js';

    // Block render if user lacks the configured min role. Throws on deny.
    await guardPage('admin-brands').catch((err) => { throw err; });

    const FIREBASE_CONFIG = getFirebaseConfig();

    let firebaseAuth = null;
    let authToken = null;
    let fbUserInfo = null;
    let currentUser = null;
    let brands = [];
    let statusFilter = 'pending';

    async function loadFirebaseAuth() {
      const [appMod, authMod] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js'),
      ]);
      const app = appMod.getApps().length ? appMod.getApp() : appMod.initializeApp(FIREBASE_CONFIG);
      firebaseAuth = authMod.getAuth(app);
      return authMod;
    }

    function authFetch(url, opts = {}) {
      if (authToken) {
        opts.headers = { ...opts.headers, Authorization: `Bearer ${authToken}` };
      }
      return fetch(url, opts);
    }

    async function doSignOut() {
      const { signOut } = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js');
      await signOut(firebaseAuth);
      authToken = null;
      renderGate('Sign in to review brand requests.', true);
    }

    function renderGate(msg, showSignIn = false) {
      const role = currentUser?.role || 'Player';
      document.getElementById('app').innerHTML = `
        ${renderAdminHeader({ role })}
        <div class="admin-brands__gate">
          <div>
            <h1>Brand Requests</h1>
            <p>${msg}</p>
            ${showSignIn ? '<button class="btn btn--google" id="sign-in-btn" style="font-size:1rem;padding:0.75em 1.5em">Sign in with Google</button>' : ''}
          </div>
        </div>`;
      bindAdminHeader(document.getElementById('app'), { role });
      if (showSignIn) {
        document.getElementById('sign-in-btn').addEventListener('click', async () => {
          const authMod = await loadFirebaseAuth();
          const provider = new authMod.GoogleAuthProvider();
          await authMod.signInWithPopup(firebaseAuth, provider);
        });
      }
    }

    function renderPage() {
      resetAdminHeaderMenu();
      const app = document.getElementById('app');
      const headerRole = currentUser?.role || 'Admin';
      app.innerHTML = `
        ${renderAdminHeader({ user: fbUserInfo, role: headerRole })}
        <div class="admin-brands">
          <div class="admin-brands__header">
            <h1 class="admin-brands__title">Brand Requests <span class="admin-brands__count">(${brands.length})</span></h1>
            <label class="admin-brands__filter">Status
              <select id="brand-status-filter">${filterOptions(statusFilter)}</select>
            </label>
          </div>
          <div id="brands-table">${renderBrandsTable(brands)}</div>
        </div>`;

      bindAdminHeader(app, { user: fbUserInfo, role: headerRole, onSignOut: doSignOut });

      document.getElementById('brand-status-filter').addEventListener('change', (e) => {
        statusFilter = e.target.value;
        loadBrands();
      });

      bindActions();
    }

    function bindActions() {
      document.querySelectorAll('.admin-brands__btn').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-brand-id');
          const status = btn.getAttribute('data-status');
          const label = btn.textContent;
          if (!window.confirm(`${label} this brand?`)) return;
          document.querySelectorAll(`.admin-brands__btn[data-brand-id="${id}"]`).forEach((b) => { b.disabled = true; });
          try {
            const res = await authFetch(`/api/carkedit/brands/${id}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ status }),
            });
            if (res.ok) {
              await loadBrands();
            } else {
              const data = await res.json().catch(() => ({}));
              window.alert(data.error || 'Failed to update brand');
              document.querySelectorAll(`.admin-brands__btn[data-brand-id="${id}"]`).forEach((b) => { b.disabled = false; });
            }
          } catch (err) {
            window.alert('Network error');
            document.querySelectorAll(`.admin-brands__btn[data-brand-id="${id}"]`).forEach((b) => { b.disabled = false; });
          }
        });
      });
    }

    async function loadBrands() {
      try {
        const qs = statusFilter ? `?status=${encodeURIComponent(statusFilter)}` : '';
        const res = await authFetch(`/api/carkedit/brands${qs}`);
        if (res.status === 403) { renderGate('You do not have admin access.', false); return; }
        if (!res.ok) { renderGate('Failed to load brand requests.', false); return; }
        const data = await res.json();
        brands = data.brands || [];
        renderPage();
      } catch (err) {
        renderGate('Failed to load brand requests.', false);
      }
    }

    async function fetchCurrentUser() {
      try {
        const res = await authFetch('/api/carkedit/users/me');
        if (res.ok) currentUser = await res.json();
      } catch (err) {
        // Non-fatal; header falls back to default 'Admin' filter.
      }
    }

    async function boot() {
      await fetchCurrentUser();
      await loadBrands();
    }

    // Init
    renderGate('Loading...', false);
    try {
      const authMod = await loadFirebaseAuth();
      authMod.onAuthStateChanged(firebaseAuth, async (user) => {
        if (user) {
          authToken = await user.getIdToken();
          fbUserInfo = { displayName: user.displayName, photoURL: user.photoURL, email: user.email };
          await boot();
        } else {
          authToken = null;
          fbUserInfo = null;
          renderGate('Sign in to review brand requests.', true);
        }
      });
    } catch (err) {
      renderGate('Authentication service unavailable.', false);
    }
    </script>
</body>
</html>
