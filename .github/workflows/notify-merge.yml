name: Notify merge to Discord

on:
  pull_request:
    types: [closed]

jobs:
  notify:
    # Only fire when the PR was actually merged into main (not just closed),
    # and only for the main branch — not for back-merges into release branches.
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: POST merge event to carkedit-deploy batcher
        env:
          NOTIFY_TOKEN: ${{ secrets.DEPLOY_TOKEN_MERGE_NOTIFY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -eo pipefail
          PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --argjson pr "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg author "$PR_AUTHOR" \
            --arg url "$PR_URL" \
            --arg mergedAt "$PR_MERGED_AT" \
            '{repo:$repo, pr:$pr, title:$title, author:$author, url:$url, mergedAt:$mergedAt}')
          RESPONSE=$(curl -sS -w "\nHTTP_CODE:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${NOTIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://play.carkedit.com/api/admin/notify/merge")
          HTTP_CODE=$(echo "$RESPONSE" | grep -oE 'HTTP_CODE:[0-9]+' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_CODE:/d')
          echo "$BODY" | jq . || echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::merge notify HTTP $HTTP_CODE — Discord notification failed"
            exit 1
          fi
