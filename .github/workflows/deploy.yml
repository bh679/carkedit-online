name: Deploy client to dev

on:
  push:
    branches: ['**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger carkedit-deploy
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN_DEV_CLIENT }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -eo pipefail
          QUERY=$([ "${GITHUB_REF_TYPE}" = "tag" ] && echo "tag=${REF_NAME}" || echo "branch=${REF_NAME}")
          RESPONSE=$(curl -sS -w "\nHTTP_CODE:%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${DEPLOY_TOKEN}" \
            "https://dev.play.carkedit.com/api/admin/deploy/api/client?${QUERY}")
          HTTP_CODE=$(echo "$RESPONSE" | grep -oE 'HTTP_CODE:[0-9]+' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed '/^HTTP_CODE:/d')
          echo "$BODY" | jq . || echo "$BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::HTTP $HTTP_CODE — see body above"
            exit 1
          fi
