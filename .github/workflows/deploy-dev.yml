name: Deploy to dev (dev.play.carkedit.com)

on:
  push:
    branches: ['**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger dev deploy webhook
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://dev.play.carkedit.com/carkedit-online/deploy.php?token=${{ secrets.DEPLOY_TOKEN_DEV }}&target=client&branch=${{ github.ref_name }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Dev deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
          STATUS=$(echo "$BODY" | jq -r '.status')
          if [ "$STATUS" = "skipped" ]; then
            echo "Deploy skipped: $(echo "$BODY" | jq -r '.message')"
          elif [ "$STATUS" = "ok" ]; then
            echo "Dev deploy successful!"
          else
            echo "::error::Dev deploy status: $STATUS"
            exit 1
          fi
