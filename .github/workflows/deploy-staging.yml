name: Deploy to staging (staging.play.carkedit.com)

on:
  push:
    tags:
      - 'vs*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger staging deploy webhook
        run: |
          echo "Deploying tag: ${{ github.ref_name }}"
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://staging.play.carkedit.com/carkedit-online/deploy.php?token=${{ secrets.DEPLOY_TOKEN_STAGING }}&target=client&branch=${{ github.ref_name }}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response: $BODY"
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Staging deploy failed with HTTP $HTTP_CODE"
            exit 1
          fi
          echo "$BODY" | jq -r '.status' | grep -q "ok" || { echo "::error::Staging deploy status not ok"; exit 1; }
          echo "Staging deploy successful!"
