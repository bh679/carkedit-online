<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .s1 { fill: var(--c1, #000); opacity: 0.6; }
      .s2 { fill: var(--c2, #333); opacity: 0.5; }
      .s3 { fill: var(--c3, #666); opacity: 0.45; }
    </style>
  </defs>
  <!-- Large splatter blobs -->
  <ellipse class="s1" cx="45" cy="35" rx="30" ry="22" transform="rotate(-15 45 35)"/>
  <ellipse class="s2" cx="150" cy="55" rx="35" ry="20" transform="rotate(25 150 55)"/>
  <ellipse class="s3" cx="90" cy="140" rx="28" ry="32" transform="rotate(-8 90 140)"/>
  <ellipse class="s1" cx="170" cy="160" rx="22" ry="18" transform="rotate(35 170 160)"/>

  <!-- Medium splats -->
  <circle class="s2" cx="30" cy="120" r="15"/>
  <circle class="s3" cx="130" cy="20" r="12"/>
  <circle class="s1" cx="75" cy="80" r="18"/>
  <ellipse class="s2" cx="185" cy="110" rx="14" ry="20" transform="rotate(50 185 110)"/>

  <!-- Small drips / dots -->
  <circle class="s3" cx="60" cy="170" r="8"/>
  <circle class="s1" cx="15" cy="75" r="6"/>
  <circle class="s2" cx="110" cy="100" r="9"/>
  <circle class="s3" cx="160" cy="185" r="7"/>
  <circle class="s1" cx="95" cy="15" r="5"/>
  <circle class="s2" cx="40" cy="190" r="6"/>
  <circle class="s1" cx="180" cy="30" r="8"/>

  <!-- Tiny speckles -->
  <circle class="s3" cx="140" cy="130" r="4"/>
  <circle class="s1" cx="20" cy="160" r="3"/>
  <circle class="s2" cx="70" cy="50" r="4"/>
  <circle class="s3" cx="120" cy="70" r="3"/>
  <circle class="s1" cx="50" cy="100" r="3"/>
  <circle class="s2" cx="165" cy="85" r="4"/>
  <circle class="s3" cx="10" cy="40" r="3"/>
  <circle class="s1" cx="100" cy="185" r="4"/>
  <circle class="s2" cx="190" cy="145" r="3"/>
</svg>
