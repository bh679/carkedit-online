<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarkedIt — User Management</title>
    <link rel="stylesheet" href="css/base.css?v=1.06.0051">
    <link rel="stylesheet" href="css/components/auth.css?v=1.06.0051">
    <link rel="stylesheet" href="css/components/admin-header.css?v=1.06.0051">
    <link rel="stylesheet" href="css/dashboard.css?v=1.06.0051">
    <style>
        .admin-users { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
        .admin-users__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.5rem; }
        .admin-users__title { font-size: 1.4rem; margin: 0; }
        .admin-users__nav { display: flex; gap: 0.5rem; }
        .admin-users__table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .admin-users__table th,
        .admin-users__table td { padding: 0.6rem 0.75rem; text-align: left; border-bottom: 1px solid #333; }
        .admin-users__table th { color: #888; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .admin-users__table tr:hover { background: rgba(255,255,255,0.03); }
        .admin-users__avatar { width: 28px; height: 28px; border-radius: 50%; vertical-align: middle; margin-right: 0.5rem; }
        .admin-users__badge { display: inline-block; padding: 0.15em 0.55em; border-radius: 4px; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.02em; }
        .admin-users__badge--admin  { background: #6a2d4f; color: #e4b7d4; }
        .admin-users__badge--qa     { background: #4a3a85; color: #c8b9ff; }
        .admin-users__badge--host   { background: #2d4a6a; color: #b7d4e4; }
        .admin-users__badge--player { background: #333;    color: #888; }
        .admin-users__role-select { padding: 0.3em 0.6em; font-size: 0.8rem; border: 1px solid #555; border-radius: 4px; background: #1a1a1a; color: #ccc; cursor: pointer; }
        .admin-users__role-select:hover:not(:disabled) { border-color: #888; color: #fff; }
        .admin-users__role-select:disabled { opacity: 0.5; cursor: not-allowed; }
        .admin-users__count { color: #888; font-size: 0.85rem; }
        .admin-users__gate { display: flex; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
        .admin-users__gate p { color: #888; margin-bottom: 1em; }
    </style>
    <script src="js/branch-banner.js"></script>
</head>
<body>
    <div id="app"></div>
    <script type="module">
    'use strict';

    import { renderAdminHeader, bindAdminHeader, resetAdminHeaderMenu } from './js/components/admin-header.js';
    import { getFirebaseConfig } from './js/firebase-config.js';

    const FIREBASE_CONFIG = getFirebaseConfig();

    let firebaseAuth = null;
    let authToken = null;
    let fbUserInfo = null;

    async function loadFirebaseAuth() {
      const [appMod, authMod] = await Promise.all([
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js'),
        import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js'),
      ]);
      const app = appMod.initializeApp(FIREBASE_CONFIG);
      firebaseAuth = authMod.getAuth(app);
      return authMod;
    }

    function authFetch(url, opts = {}) {
      if (authToken) {
        opts.headers = { ...opts.headers, Authorization: `Bearer ${authToken}` };
      }
      return fetch(url, opts);
    }

    function renderGate(msg, showSignIn = false) {
      document.getElementById('app').innerHTML = `
        ${renderAdminHeader()}
        <div class="admin-users__gate">
          <div>
            <h1>User Management</h1>
            <p>${msg}</p>
            ${showSignIn ? '<button class="btn btn--google" id="sign-in-btn" style="font-size:1rem;padding:0.75em 1.5em">Sign in with Google</button>' : ''}
          </div>
        </div>`;
      bindAdminHeader(document.getElementById('app'), {});
      if (showSignIn) {
        document.getElementById('sign-in-btn').addEventListener('click', async () => {
          const authMod = await loadFirebaseAuth();
          const provider = new authMod.GoogleAuthProvider();
          await authMod.signInWithPopup(firebaseAuth, provider);
        });
      }
    }

    let users = [];
    let currentUser = null;
    const ROLES = ['Player', 'Host', 'QA', 'Admin'];

    async function doSignOut() {
      const { signOut } = await import('https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js');
      await signOut(firebaseAuth);
      authToken = null;
      renderGate('Sign in to access user management.', true);
    }

    function roleBadge(role) {
      const r = role || 'Player';
      return `<span class="admin-users__badge admin-users__badge--${r.toLowerCase()}">${r}</span>`;
    }

    function roleSelect(u, currentRole, disabled) {
      const opts = ROLES.map(r => {
        const sel = r === currentRole ? ' selected' : '';
        return `<option value="${r}"${sel}>${r}</option>`;
      }).join('');
      const dis = disabled ? ' disabled title="Promote another admin first before changing your own role"' : '';
      return `<select class="admin-users__role-select" data-user-id="${u.id}"${dis}>${opts}</select>`;
    }

    function renderUsers() {
      resetAdminHeaderMenu();
      const app = document.getElementById('app');
      const rows = users.map(u => {
        const avatar = u.avatar_url
          ? `<img class="admin-users__avatar" src="${u.avatar_url}" alt="" />`
          : '';
        const role = u.role || (u.is_admin ? 'Admin' : 'Host');
        const isSelf = currentUser && u.id === currentUser.id;
        return `<tr>
          <td>${avatar}${u.display_name || '—'}</td>
          <td>${u.email || '—'}</td>
          <td>${roleBadge(role)}</td>
          <td>${u.firebase_uid ? 'Yes' : 'No'}</td>
          <td>${new Date(u.created_at).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: '2-digit' })}</td>
          <td>${roleSelect(u, role, isSelf)}</td>
        </tr>`;
      }).join('');

      const headerRole = currentUser?.role || 'Admin';
      app.innerHTML = `
        ${renderAdminHeader({ user: fbUserInfo, role: headerRole })}
        <div class="admin-users">
          <div class="admin-users__header">
            <h1 class="admin-users__title">User Management <span class="admin-users__count">(${users.length} users)</span></h1>
          </div>
          <table class="admin-users__table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Linked</th>
                <th>Created</th>
                <th>Role</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;

      bindAdminHeader(app, { user: fbUserInfo, role: headerRole, onSignOut: doSignOut });

      document.querySelectorAll('.admin-users__role-select').forEach(sel => {
        sel.addEventListener('change', async () => {
          const userId = sel.getAttribute('data-user-id');
          const newRole = sel.value;
          const prev = users.find(u => u.id === userId)?.role;
          sel.disabled = true;
          try {
            const res = await authFetch(`/api/carkedit/users/${userId}/role`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ role: newRole }),
            });
            if (res.ok) {
              const updated = await res.json();
              const idx = users.findIndex(u => u.id === userId);
              if (idx >= 0) users[idx] = updated;
              renderUsers();
            } else {
              const data = await res.json();
              alert(data.error || 'Failed to update role');
              sel.value = prev || 'Host';
              sel.disabled = false;
            }
          } catch (err) {
            alert('Network error');
            sel.value = prev || 'Host';
            sel.disabled = false;
          }
        });
      });
    }

    async function fetchCurrentUser() {
      try {
        const res = await authFetch('/api/carkedit/users/me');
        if (res.ok) currentUser = await res.json();
      } catch (err) {
        // Non-fatal; header will fall back to default 'Admin' filter.
      }
    }

    async function boot() {
      try {
        await fetchCurrentUser();
        const res = await authFetch('/api/carkedit/users');
        if (res.status === 403) {
          // Not admin — try bootstrap (works only if no admins exist)
          const bootstrapRes = await authFetch('/api/carkedit/admin/bootstrap', { method: 'POST' });
          if (bootstrapRes.ok) {
            await fetchCurrentUser();
            const retryRes = await authFetch('/api/carkedit/users');
            if (retryRes.ok) {
              const data = await retryRes.json();
              users = data.users || [];
              renderUsers();
              return;
            }
          }
          // Admins exist but this user isn't one — show access denied
          renderGate('You do not have admin access.', false);
          return;
        }
        if (!res.ok) {
          renderGate('You do not have admin access.', false);
          return;
        }
        const data = await res.json();
        users = data.users || [];
        renderUsers();
      } catch (err) {
        renderGate('Failed to load users.', false);
      }
    }

    // Init
    renderGate('Loading...', false);
    try {
      const authMod = await loadFirebaseAuth();
      authMod.onAuthStateChanged(firebaseAuth, async (user) => {
        if (user) {
          authToken = await user.getIdToken();
          fbUserInfo = { displayName: user.displayName, photoURL: user.photoURL, email: user.email };
          await boot();
        } else {
          authToken = null;
          fbUserInfo = null;
          renderGate('Sign in to access user management.', true);
        }
      });
    } catch (err) {
      renderGate('Authentication service unavailable.', false);
    }
    </script>
</body>
</html>
